version: '3.8'

services:
  db:
    image: docker.io/library/postgres:15-alpine
    environment:
      POSTGRES_USER: nyx_user
      POSTGRES_PASSWORD: nyx_password
      POSTGRES_DB: nyx_glam_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    image: docker.io/library/node:18-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - PORT=5000
      - DATABASE_URL=postgres://nyx_user:nyx_password@db:5432/nyx_glam_db
    ports:
      - "5000:5000"
    command: >
      sh -c "npm install && node seed-services.js && npm run dev"

volumes:
  pgdata:
